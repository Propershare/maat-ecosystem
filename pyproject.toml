[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "ARG", "PTH", "PL"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
allow_untyped_decorators = true
explicit_package_bases = true

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = [
    "maat-ecosystem",
    "maat-core",
    "maat-memory",
    "maat-apps",
    "maatbench",
    "maat-studio",
    "tehuti-guard/guard",
]
python_files = ["test_*.py", "*_test.py"]
filterwarnings = ["ignore::DeprecationWarning"]
