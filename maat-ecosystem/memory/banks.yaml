# banks.yaml — Memory Bank Configuration
# Swap backends by changing one line. The organ stays the same.
#
# Every bank is a folder. Drop a new adapter in, point the config, restart.
# Memory banks are like USB drives — hot-swappable storage for the memory organ.

# ─── ACTIVE BANKS ───
# These are currently in use. The memory organ reads/writes to these.

active:
  primary:
    adapter: "postgres"
    config:
      url: "${PGVECTOR_DB_URL}"
      pool_size: 5
      timeout: 30
    stores:
      - episodic       # What happened
      - semantic        # What I know
      - task            # What I'm doing
      - constitutional  # What I must never forget (append-only)
    meter:
      warn_at: 80      # % capacity — warn the operator
      critical_at: 95  # % capacity — start archiving
      auto_archive: true

  vectors:
    adapter: "pgvector"
    config:
      url: "${PGVECTOR_DB_URL}"
      embedding_model: "nomic-embed-text"
      dimensions: 768
    stores:
      - embeddings     # Semantic search vectors
    meter:
      warn_at: 70
      critical_at: 90

# ─── AVAILABLE ADAPTERS ───
# Drop an adapter file in memory/adapters/ to add a new backend.
# Each adapter implements: connect, store, retrieve, search, health, stats

adapters:
  postgres:
    file: "adapters_postgres.py"
    description: "PostgreSQL with pgvector — production default"
    supports: [store, retrieve, search, session, health, stats]
    
  sqlite:
    file: "adapters_sqlite.py"
    description: "SQLite — lightweight, single-file, good for dev/edge"
    supports: [store, retrieve, search, session, health, stats]
    
  # --- Future adapters (drop the file, uncomment, restart) ---
