# ─── MEMORY METER ───
# Each bank tracks its own usage. The Ka organ reads these for health checks.

meter:
  poll_interval: "5m"    # Check bank levels every 5 minutes
  
  metrics:
    - name: "capacity"
      description: "How full is this bank (rows, bytes, or vectors)"
      unit: "percent"
      
    - name: "throughput"
      description: "Reads and writes per minute"
      unit: "ops/min"
      
    - name: "latency"
      description: "Average read/write latency"
      unit: "ms"
      
    - name: "freshness"
      description: "Age of newest entry"
      unit: "seconds"
      
    - name: "fragmentation"
      description: "How scattered the data is (0=clean, 1=fragmented)"
      unit: "ratio"
      
    - name: "confidence_avg"
      description: "Average confidence of stored learnings"
      unit: "ratio"

  alerts:
    - condition: "capacity > warn_at"
      action: "notify"
      message: "Memory bank {bank} at {capacity}% — consider archiving"
      
    - condition: "capacity > critical_at"
      action: "auto_archive"
      message: "Memory bank {bank} critical — archiving old entries"
      
    - condition: "latency > 1000"
      action: "notify"
      message: "Memory bank {bank} slow — {latency}ms latency"
      
    - condition: "freshness > 3600"
      action: "notify"
      message: "Memory bank {bank} stale — no writes in {freshness}s"

# ─── BANK LIFECYCLE ───
# How data flows between banks over time.

lifecycle:
  hot:
    description: "Active memory — fast access, recent data"
    max_age: "7d"
    adapter: "postgres"
    
  warm:
    description: "Recent memory — still searchable, less accessed"
    max_age: "90d"
    adapter: "postgres"
    
  cold:
    description: "Archived memory — compressed, rarely accessed"
    max_age: "unlimited"
    adapter: "sqlite"    # Portable single-file archive
    path: "memory/archive/"
    
  transitions:
    - from: "hot"
      to: "warm"
      trigger: "age > 7d"
      action: "move"
      
    - from: "warm"
      to: "cold"
      trigger: "age > 90d AND access_count < 3"
      action: "compress_and_archive"
      
    - from: "cold"
      to: "warm"
      trigger: "accessed"
      action: "restore"   # Cold memories warm up when needed
